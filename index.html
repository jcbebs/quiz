  /* =========================================
   Clean Quiz Container Design
   ========================================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Arial, sans-serif;
  background:#f4f7fb;
  color:#222;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:40px 20px;
}

/* Main App Container */
#app{
  width:100%;
  max-width:950px;
  background:#ffffff;
  border-radius:20px;
  padding:30px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  border:1px solid #e6e6e6;
}

/* Header */
.header{
  margin-bottom:25px;
}

.header h2{
  font-size:28px;
  font-weight:700;
  color:#111827;
  margin-bottom:8px;
}

.header p{
  font-size:15px;
  color:#6b7280;
}

/* Tabs */
.tabs{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:25px;
}

.tab{
  padding:10px 18px;
  border:none;
  border-radius:12px;
  background:#eef2ff;
  color:#374151;
  cursor:pointer;
  font-size:14px;
  transition:0.2s ease;
}

.tab:hover{
  background:#dbe4ff;
}

.tab.active{
  background:#2563eb;
  color:white;
  font-weight:600;
}

/* Quiz Card */
.quiz-card{
  background:#fafafa;
  border:1px solid #e5e7eb;
  border-radius:18px;
  padding:25px;
}

/* Progress */
.progress-bar{
  width:100%;
  height:8px;
  background:#e5e7eb;
  border-radius:999px;
  overflow:hidden;
  margin-bottom:20px;
}

.progress-fill{
  height:100%;
  background:#2563eb;
  border-radius:999px;
  transition:width 0.3s ease;
}

/* Question */
.q-meta{
  font-size:13px;
  color:#6b7280;
  margin-bottom:10px;
}

.q-text{
  font-size:20px;
  line-height:1.6;
  margin-bottom:25px;
  color:#111827;
  font-weight:600;
}

/* Options */
.options{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-bottom:20px;
}

.opt{
  width:100%;
  text-align:left;
  padding:15px 18px;
  border:1px solid #d1d5db;
  border-radius:14px;
  background:white;
  cursor:pointer;
  font-size:15px;
  transition:0.2s ease;
}

.opt:hover:not(:disabled){
  background:#f3f4f6;
  border-color:#2563eb;
}

.opt.correct{
  background:#dcfce7;
  border-color:#22c55e;
  color:#166534;
}

.opt.wrong{
  background:#fee2e2;
  border-color:#ef4444;
  color:#991b1b;
}

/* Feedback */
.feedback{
  padding:14px 16px;
  border-radius:12px;
  margin-bottom:20px;
  font-size:14px;
  line-height:1.6;
}

.feedback.correct{
  background:#dcfce7;
  color:#166534;
  border:1px solid #22c55e;
}

.feedback.wrong{
  background:#fee2e2;
  color:#991b1b;
  border:1px solid #ef4444;
}

/* Navigation */
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

/* Buttons */
.btn{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:14px;
  transition:0.2s ease;
}

.btn.primary{
  background:#2563eb;
  color:white;
}

.btn.primary:hover{
  background:#1d4ed8;
}

.btn:not(.primary){
  background:#f3f4f6;
  color:#111827;
}

.btn:not(.primary):hover{
  background:#e5e7eb;
}

/* Score Card */
.score-card{
  text-align:center;
  padding:20px 10px;
}

.score-big{
  font-size:60px;
  font-weight:700;
  color:#2563eb;
  margin-bottom:10px;
}

.score-label{
  font-size:18px;
  color:#4b5563;
  margin-bottom:25px;
}

.score-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:15px;
  margin-bottom:25px;
}

.score-metric{
  background:white;
  border:1px solid #e5e7eb;
  border-radius:16px;
  padding:20px;
}

.score-metric .num{
  font-size:28px;
  font-weight:700;
  color:#111827;
}

.score-metric .lbl{
  font-size:13px;
  color:#6b7280;
  margin-top:5px;
}

/* Mobile Responsive */
@media (max-width:768px){

  body{
    padding:20px 10px;
  }

  #app{
    padding:20px;
    border-radius:16px;
  }

  .header h2{
    font-size:22px;
  }

  .q-text{
    font-size:18px;
  }

  .nav{
    flex-direction:column;
    align-items:stretch;
  }

  .btn{
    width:100%;
  }

  .tabs{
    flex-direction:column;
  }

  .tab{
    width:100%;
    text-align:center;
  }
}
</style>

let currentModule = 0;
let currentQ = 0;
let answered = false;
let scores = {};
MODULES.forEach(m => scores[m.id] = {correct:0,total:0,done:false});

function shuffle(arr){
  let a=[...arr];
  for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

let shuffledQs = [];

function startModule(idx){
  currentModule = idx;
  currentQ = 0;
  answered = false;
  shuffledQs = shuffle(MODULES[idx].questions);
  scores[MODULES[idx].id] = {correct:0,total:0,done:false};
  render();
}

function render(){
  const app = document.getElementById('app');
  const mod = MODULES[currentModule];
  const qs = shuffledQs;
  const isDone = currentQ >= qs.length;

  let tabsHTML = MODULES.map((m,i)=>{
    const s = scores[m.id];
    const pct = s.total>0 ? Math.round(s.correct/s.total*100)+'%' : '';
    return `<button class="tab${i===currentModule?' active':''}" onclick="startModule(${i})">${m.title}${s.done?' ('+pct+')':''}</button>`;
  }).join('');

  if(isDone){
    const s = scores[mod.id];
    scores[mod.id].done = true;
    const pct = Math.round(s.correct/s.total*100);
    const allDone = MODULES.every(m=>scores[m.id].done);
    let totalCorrect=0,totalQ=0;
    MODULES.forEach(m=>{totalCorrect+=scores[m.id].correct;totalQ+=scores[m.id].total;});
    const totalPct = totalQ>0 ? Math.round(totalCorrect/totalQ*100) : 0;
    app.innerHTML = `
      <div class="header"><h2>WordPress Final Exam Quiz</h2><p>8 topic modules • 20+ questions each</p></div>
      <div class="tabs">${tabsHTML}</div>
      <div class="quiz-card">
        <div class="score-card">
          <div class="score-big">${pct}%</div>
          <div class="score-label">${mod.title}</div>
          <div class="score-grid">
            <div class="score-metric"><div class="num">${s.correct}</div><div class="lbl">Correct</div></div>
            <div class="score-metric"><div class="num">${s.total-s.correct}</div><div class="lbl">Wrong</div></div>
            <div class="score-metric"><div class="num">${s.total}</div><div class="lbl">Total</div></div>
          </div>
          ${allDone?`<div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;margin-bottom:1.25rem;font-size:14px;color:var(--color-text-secondary)">All modules complete! Overall score: <strong style="color:var(--color-text-primary)">${totalPct}%</strong> (${totalCorrect}/${totalQ})</div>`:''}
          <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
            <button class="btn primary" onclick="startModule(${currentModule})">Retake this module</button>
            ${currentModule < MODULES.length-1 ? `<button class="btn" onclick="startModule(${currentModule+1})">Next module →</button>` : ''}
          </div>
        </div>
      </div>`;
    return;
  }

  const q = qs[currentQ];
  const progress = Math.round((currentQ/qs.length)*100);

  app.innerHTML = `
    <div class="header"><h2>WordPress Final Exam Quiz</h2><p>8 topic modules • 20+ questions each</p></div>
    <div class="tabs">${tabsHTML}</div>
    <div class="quiz-card">
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
      <div class="q-meta">${mod.title} — Question ${currentQ+1} of ${qs.length}</div>
      <div class="q-text" id="qtext">${q.q}</div>
      <div class="options" id="opts">
        ${q.opts.map((o,i)=>`<button class="opt" id="opt${i}" onclick="answer(${i})">${o}</button>`).join('')}
      </div>
      <div id="fb"></div>
      <div class="nav">
        <span style="font-size:13px;color:var(--color-text-tertiary)">${scores[mod.id].correct} correct so far</span>
        <button class="btn primary" id="nextbtn" style="display:none" onclick="next()">Next question →</button>
      </div>
    </div>`;
}

function answer(idx){
  if(answered) return;
  answered = true;
  const mod = MODULES[currentModule];
  const q = shuffledQs[currentQ];
  const isCorrect = idx === q.ans;
  scores[mod.id].total++;
  if(isCorrect) scores[mod.id].correct++;

  q.opts.forEach((_,i)=>{
    const btn = document.getElementById('opt'+i);
    btn.disabled = true;
    if(i===q.ans) btn.classList.add('correct');
    else if(i===idx && !isCorrect) btn.classList.add('wrong');
  });

  document.getElementById('fb').innerHTML = `<div class="feedback ${isCorrect?'correct':'wrong'}">${isCorrect?'✓ Correct! ':'✗ Incorrect. '}${q.exp}</div>`;
  document.getElementById('nextbtn').style.display='block';
}

function next(){
  currentQ++;
  answered = false;
  render();
}

render();
</script>
